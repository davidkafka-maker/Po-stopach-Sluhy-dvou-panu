<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Po stopách Sluhy dvou pánů</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --night:#120911;
      --wine:#7f1426;
      --wine2:#a01f34;
      --gold:#f0bd56;
      --paper:#fff6e4;
      --ink:#261016;
      --blue:#1265d8;
      --red:#c51f2f;
      --green:#188a3c;
      --shadow:rgba(0,0,0,.45);
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      min-height:100vh;
      padding:14px;
      font-family: Georgia, "Times New Roman", serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 15% 15%, rgba(240,189,86,.34), transparent 18%),
        radial-gradient(circle at 80% 10%, rgba(255,255,255,.12), transparent 14%),
        linear-gradient(135deg, #10070d 0%, #3a101d 58%, #070408 100%);
      display:flex;
      justify-content:center;
      align-items:stretch;
    }
    .app {
      width:min(1040px,100%);
      min-height:calc(100vh - 28px);
      background:
        linear-gradient(rgba(255,246,228,.94), rgba(255,246,228,.96)),
        repeating-linear-gradient(45deg, rgba(127,20,38,.04), rgba(127,20,38,.04) 8px, transparent 8px, transparent 18px);
      border:7px double var(--gold);
      border-radius:26px;
      box-shadow:0 24px 80px var(--shadow);
      padding:22px;
      position:relative;
      overflow:hidden;
    }
    .app::before {
      content:"";
      position:absolute;
      inset:14px;
      border:1px solid rgba(127,20,38,.18);
      border-radius:18px;
      pointer-events:none;
    }
    h1 {
      margin:8px 0 4px;
      text-align:center;
      color:var(--wine);
      font-size:clamp(34px,5.5vw,62px);
      text-shadow:0 2px 0 rgba(240,189,86,.45);
      letter-spacing:.4px;
    }
    .subtitle {
      text-align:center;
      color:#6a303a;
      font-size:18px;
      margin:0 0 18px;
    }
    .card {
      background:rgba(255,255,255,.76);
      border:2px solid rgba(127,20,38,.22);
      border-radius:22px;
      padding:20px;
      margin:14px 0;
      box-shadow:0 10px 28px rgba(61,20,28,.12);
    }
    .startCard {
      max-width:760px;
      margin:20px auto 0;
      padding:24px;
    }
    .row {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    label {
      display:block;
      font-weight:bold;
      margin-bottom:7px;
      color:#4b2028;
      font-size:18px;
    }
    input {
      width:100%;
      padding:14px 15px;
      border-radius:15px;
      border:2px solid rgba(127,20,38,.36);
      font-size:19px;
      background:#fff;
      outline:none;
    }
    input:focus {
      border-color:var(--wine2);
      box-shadow:0 0 0 4px rgba(160,31,52,.14);
    }
    button, a.btn {
      cursor:pointer;
      border:0;
      border-radius:18px;
      padding:16px 24px;
      font-weight:bold;
      font-size:20px;
      color:white;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-family: Georgia, "Times New Roman", serif;
      letter-spacing:.3px;
      transition:transform .08s ease, filter .12s ease;
    }
    button:active, a.btn:active { transform:translateY(2px); }
    .btnTest {
      background:linear-gradient(135deg, #a71934, #6f1022);
      box-shadow:0 6px 0 #4d0b17, 0 10px 24px rgba(127,20,38,.28);
    }
    .btnTable {
      background:linear-gradient(135deg, #2d6cdf, #17408c);
      box-shadow:0 6px 0 #102c61, 0 10px 24px rgba(18,101,216,.25);
    }
    .btnMenu {
      background:linear-gradient(135deg, #7b5422, #4c3212);
      box-shadow:0 6px 0 #2e1d0a;
    }
    button:hover, a.btn:hover { filter:brightness(1.06); }
    button:disabled { opacity:.65; cursor:not-allowed; transform:none; }
    .center { text-align:center; }
    .hidden { display:none !important; }
    .startButtons {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-top:22px;
    }
    .topbar {
      display:grid;
      grid-template-columns:1fr 1.1fr 1fr;
      gap:12px;
      align-items:center;
      margin:10px 0 14px;
    }
    .pill {
      background:linear-gradient(135deg, #f8e6bd, #efd18a);
      border:1px solid rgba(127,20,38,.25);
      padding:10px 13px;
      border-radius:999px;
      color:#562730;
      font-weight:bold;
      text-align:center;
      box-shadow:0 4px 12px rgba(61,20,28,.10);
    }
    #timeText {
      font-size:clamp(22px,3.2vw,34px);
      color:#7f1426;
      padding:10px 16px;
      border:2px solid rgba(127,20,38,.34);
      text-shadow:0 2px 0 rgba(255,255,255,.55);
    }
    .timerWrap {
      background:#ead0a0;
      border-radius:999px;
      overflow:hidden;
      height:18px;
      border:1px solid rgba(127,20,38,.25);
      margin:8px 0 2px;
    }
    .timerBar {
      height:100%;
      width:100%;
      background:linear-gradient(90deg, #2d9b4d, #f0bd56, #c51f2f);
      transition:width .15s linear;
    }
    .questionCard {
      position:relative;
      padding:24px;
      background:
        radial-gradient(circle at top left, rgba(240,189,86,.18), transparent 34%),
        rgba(255,255,255,.80);
    }
    .question {
      font-size:clamp(23px,3vw,33px);
      line-height:1.35;
      margin:8px 0 22px;
      color:#260c13;
      font-weight:bold;
      text-align:center;
    }
    .answers {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    .answer {
      min-height:92px;
      text-align:left;
      background:linear-gradient(135deg, #fffefb, #f8ead0);
      color:var(--ink);
      box-shadow:0 5px 0 rgba(127,20,38,.18), 0 9px 20px rgba(0,0,0,.08);
      border:2px solid rgba(127,20,38,.26);
      font-size:19px;
      line-height:1.25;
      padding:15px 16px;
    }

    .answer:disabled {
      opacity:1;
      cursor:default;
      filter:none;
    }

    .answer:hover {
      border-color:var(--wine2);
      transform:translateY(-1px);
    }
    .answer.correctReveal {
      background:linear-gradient(135deg, #e4f0ff, #5fa1ff) !important;
      border-color:var(--blue) !important;
      color:#041f52 !important;
      box-shadow:0 5px 0 #0d4fae, 0 0 0 6px rgba(18,101,216,.20) !important;
    }
    .answer.wrongReveal {
      background:linear-gradient(135deg, #ffd1d1, #df2636) !important;
      border-color:var(--red) !important;
      color:#ffffff !important;
      box-shadow:0 5px 0 #8d1520, 0 0 0 6px rgba(197,31,47,.22) !important;
    }
    .feedback {
      margin-top:18px;
      min-height:46px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:clamp(24px,3.4vw,36px);
      font-weight:bold;
      text-align:center;
    }
    .feedback.good { color:var(--green); }
    .feedback.bad { color:var(--red); }
    .feedback.blue { color:var(--blue); }
    .result-big {
      font-size:clamp(32px,5vw,54px);
      color:var(--wine);
      font-weight:bold;
      margin:12px 0;
      text-shadow:0 2px 0 rgba(240,189,86,.45);
    }
    .small { color:#684047; font-size:14px; }
    .bottomMenu {
      margin-top:22px;
      padding-top:16px;
      border-top:2px solid rgba(127,20,38,.18);
      display:flex;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
    }
    @media(max-width:720px){
      body{padding:7px;}
      .app{padding:13px; border-width:4px;}
      .row, .startButtons, .topbar, .answers{grid-template-columns:1fr;}
      button, a.btn{width:100%;}
      .answer{font-size:17px; min-height:74px;}
      .questionCard{padding:16px;}
    }
  </style>
</head>
<body>
<div class="app">
  <h1>Po stopách Sluhy dvou pánů</h1>
  <div class="subtitle">test skutečné četby</div>

  <section id="screenStart" class="card startCard">
    <div class="row">
      <div>
        <label for="surname">Příjmení</label>
        <input id="surname" autocomplete="family-name" placeholder="např. Novák">
      </div>
      <div>
        <label for="className">Třída</label>
        <input id="className" placeholder="např. 2.A">
      </div>
    </div>

    <div class="startButtons">
      <button class="btnTest" onclick="startQuiz()">TEST</button>
      <a class="btn btnTable" href="https://docs.google.com/spreadsheets/d/1_dtTEdaPKPPNqQvlmE_LKqeoZmWMQ9w7JfCWuKyD1EA/edit?usp=sharing" target="_blank" rel="noopener">VÝSLEDKOVÁ TABULKA</a>
    </div>
  </section>

  <section id="screenQuiz" class="hidden">
    <div class="topbar">
      <div class="pill" id="progress">Otázka 1/20</div>
      <div>
        <div class="pill" id="timeText">Čas: 20 s</div>
        <div class="timerWrap"><div class="timerBar" id="timerBar"></div></div>
      </div>
      <div class="pill" id="score">Body: 0</div>
    </div>

    <div class="card questionCard">
      <div id="question" class="question"></div>
      <div id="answers" class="answers"></div>
      <div id="feedback" class="feedback"></div>
    </div>
  </section>

  <section id="screenResult" class="card startCard hidden">
    <div class="center">
      <div class="result-big" id="finalTitle"></div>
      <p id="finalText"></p>
      <p id="sendStatus" class="small"></p>
      <div class="bottomMenu">
        <button class="btnMenu" onclick="goMenu()">HLAVNÍ MENU</button>
        <a class="btn btnTable" href="https://docs.google.com/spreadsheets/d/1_dtTEdaPKPPNqQvlmE_LKqeoZmWMQ9w7JfCWuKyD1EA/edit?usp=sharing" target="_blank" rel="noopener">VÝSLEDKOVÁ TABULKA</a>
      </div>
    </div>
  </section>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxn5Tb-0pvVDmjQeehPa6AgvwDE5TAXEwE7lxg95Ulo2Lbi1Bye7LF9IjP25wWgskMx/exec";
const APP_NAME = "Po stopách Sluhy dvou pánů";
const TABLE_URL = "https://docs.google.com/spreadsheets/d/1_dtTEdaPKPPNqQvlmE_LKqeoZmWMQ9w7JfCWuKyD1EA/edit?usp=sharing";
const TEST_COUNT = 20;
const PASS_LIMIT = 14;
const QUESTION_TIME = 20;
const REVEAL_TIME = 2000;


const QUESTIONS = [
{q:"Jaký předmět nalezený mezi věcmi údajného Federiga přesvědčí Florinda, že je Beatrice nablízku?",a:["její dopis","její prsten","jeho vlastní podobizna, kterou kdysi daroval Beatrici","její kapesník"],correct:"jeho vlastní podobizna, kterou kdysi daroval Beatrici"},
{q:"Čím Truffaldino znovu zalepí dopis, který neměl otevírat?",a:["voskem","slinou","chlebem","lepidlem"],correct:"chlebem"},
{q:"Jakou listinu Truffaldino nešťastnou náhodou roztrhne při hostinských zmatcích?",a:["závěť","směnku","oddací smlouvu","plnou moc"],correct:"směnku"},
{q:"Jakou nepravdivou zprávu oznámí Truffaldino Beatrici o Florindovi?",a:["že odjel do Turína","že se oženil","že byl zatčen","že zemřel"],correct:"že zemřel"},
{q:"Jak podle Truffaldina Florindo údajně zemřel?",a:["v souboji","na mor","spadl do Canalu Grande","pod koly kočáru"],correct:"spadl do Canalu Grande"},
{q:"Kdo jako první pozná, že údajný Federico je ve skutečnosti Beatrice?",a:["Pantalone","Brighella","Silvio","Doktor Lombardi"],correct:"Brighella"},
{q:"Proč se Silvio po návratu údajného Federiga ocitne v zoufalé situaci?",a:["přijde o peníze","hrozí mu vězení","znovu ztrácí Klárinku","musí opustit Benátky"],correct:"znovu ztrácí Klárinku"},
{q:"Kdo vezme Klárince kord ve chvíli, kdy chce v zoufalství ukončit život?",a:["Beatrice","Smeraldina","Pantalone","Silvio"],correct:"Smeraldina"},
{q:"Jaký dvojí zisk očekává Truffaldino od služby dvěma pánům?",a:["slávu a cestování","peníze a postavení","dvojí mzdu a dvojí stravu","majetek a titul"],correct:"dvojí mzdu a dvojí stravu"},
{q:"Která rekvizita způsobí sérii záměn mezi věcmi Florinda a Beatrice?",a:["kord","kufr","klobouk","hodinky"],correct:"kufr"},
{q:"Co Truffaldina při obsluhování dvou pánů zaměstnává víc než samotná služba?",a:["strach z Brighelly","touha po Smeraldině","vlastní hlad","obava ze souboje"],correct:"vlastní hlad"},
{q:"Kde Truffaldino obsluhuje oba své pány současně, aniž by o sobě věděli?",a:["na tržišti","v přístavu","v hostinci","v Pantalonově domě"],correct:"v hostinci"},
{q:"Jakou podobu zvolí Beatrice, aby mohla vystupovat pod Federigovým jménem?",a:["vojáka","svého bratra","kupce","sluhu"],correct:"svého bratra"},
{q:"Odkud pochází Truffaldino?",a:["z Bergama","z Turína","z Benátek","z Verony"],correct:"z Bergama"},
{q:"Jaký problém vzniká při doručování dopisů?",a:["ztratí je","zamění adresáty","spálí je","odmítne je doručit"],correct:"zamění adresáty"},
{q:"Co Florindovi napoví, že Beatrice možná není mrtvá?",a:["nalezená vlastní podobizna","dopis od Brighelly","zpráva od Pantalona","svědectví Silvia"],correct:"nalezená vlastní podobizna"},
{q:"Proč je návrat údajného Federiga nebezpečný pro vztah Klárinky a Silvia?",a:["Federigo má přednostní nárok na slíbený sňatek","Silvio se zamiluje do Beatrice","Klárinka musí odejít do kláštera","Pantalone zruší zásnuby"],correct:"Federigo má přednostní nárok na slíbený sňatek"},
{q:"Co musí Truffaldino dělat, aby oba jeho páni neodhalili jeho lest?",a:["měnit jméno","neustále běhat mezi nimi","předstírat nemoc","skrývat se"],correct:"neustále běhat mezi nimi"},
{q:"Jaké povolání vykonává Brighella?",a:["advokát","kupec","hostinský","lodník"],correct:"hostinský"},
{q:"Při jaké příležitosti se definitivně prozradí, že Truffaldino sloužil dvěma pánům?",a:["při hostině","při souboji","při řešení sňatku se Smeraldinou","při předávání směnek"],correct:"při řešení sňatku se Smeraldinou"}
];


let quiz = [];
let index = 0;
let points = 0;
let locked = false;
let started = false;
let finished = false;
let cheatTimer = null;
let timeLeft = QUESTION_TIME;
let timerInterval = null;
let revealTimeout = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function sound(freq1, freq2, length=0.22, gainMax=0.24) {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(freq1, ctx.currentTime);
    if (freq2) osc.frequency.exponentialRampToValueAtTime(freq2, ctx.currentTime + length * .7);
    gain.gain.setValueAtTime(0.001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(gainMax, ctx.currentTime + 0.025);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + length);
    osc.start();
    osc.stop(ctx.currentTime + length + 0.03);
  } catch(e) {}
}
function soundGood() {
  sound(720, 980, .20, .42);
  setTimeout(() => sound(980, 1320, .18, .42), 125);
  setTimeout(() => sound(1320, 1560, .14, .35), 240);
}
function soundBad() {
  sound(320, 170, 0.22, 0.55);
  setTimeout(() => sound(170, 90, 0.18, 0.50), 180);
}
function soundTick() {
  sound(520, 520, .06, .16);
}
function soundCheat() {
  sound(1400, 300, 0.30, 0.75);
  setTimeout(() => { sound(300, 1400, 0.30, 0.75); }, 300);
  setTimeout(() => { sound(1400, 300, 0.40, 0.80); }, 600);
}
function soundEnd(pass) {
  pass ? soundGood() : soundBad();
}

function startQuiz() {
  const surname = document.getElementById("surname").value.trim();
  const className = document.getElementById("className").value.trim();

  if (!surname || !className) {
    alert("Vyplň prosím příjmení i třídu.");
    return;
  }

  quiz = shuffle(QUESTIONS).slice(0, TEST_COUNT).map(item => ({...item, a: shuffle(item.a)}));
  index = 0;
  points = 0;
  locked = false;
  started = true;
  finished = false;

  document.getElementById("screenStart").classList.add("hidden");
  document.getElementById("screenResult").classList.add("hidden");
  document.getElementById("screenQuiz").classList.remove("hidden");

  renderQuestion();
}

function renderQuestion() {
  clearTimers();
  locked = false;
  timeLeft = QUESTION_TIME;

  const item = quiz[index];
  document.getElementById("progress").textContent = `Otázka ${index + 1}/${quiz.length}`;
  document.getElementById("score").textContent = `Body: ${points}`;
  document.getElementById("question").textContent = item.q;
  document.getElementById("feedback").textContent = "";
  document.getElementById("feedback").className = "feedback";
  updateTimerDisplay();

  const box = document.getElementById("answers");
  box.innerHTML = "";

  item.a.forEach(ans => {
    const btn = document.createElement("button");
    btn.className = "answer";
    btn.textContent = ans;
    btn.style.pointerEvents = "auto";
    btn.onclick = () => chooseAnswer(btn, ans);
    box.appendChild(btn);
  });

  timerInterval = setInterval(() => {
    timeLeft -= 1;
    updateTimerDisplay();
    if (timeLeft <= 3 && timeLeft > 0) soundTick();
    if (timeLeft <= 0) {
      handleWrongOrTimeout();
    }
  }, 1000);
}

function updateTimerDisplay() {
  document.getElementById("timeText").textContent = `Čas: ${Math.max(0, timeLeft)} s`;
  const pct = Math.max(0, Math.min(100, (timeLeft / QUESTION_TIME) * 100));
  document.getElementById("timerBar").style.width = pct + "%";
}

function chooseAnswer(btn, ans) {
  if (locked || finished) return;
  locked = true;
  clearInterval(timerInterval);

  const item = quiz[index];
  const buttons = [...document.querySelectorAll(".answer")];
  buttons.forEach(b => b.disabled = true);

  if (ans === item.correct) {
    points++;
    btn.classList.add("correctReveal");
    document.getElementById("feedback").textContent = "SPRÁVNĚ";
    document.getElementById("feedback").className = "feedback good";
    document.getElementById("score").textContent = `Body: ${points}`;
    soundGood();
  } else {
    btn.classList.add("wrongReveal");
    const correctBtn = buttons.find(b => b.textContent === item.correct);
    if (correctBtn) correctBtn.classList.add("correctReveal");
    document.getElementById("feedback").textContent = "CHYBA";
    document.getElementById("feedback").className = "feedback bad";
    soundBad();
  }

  revealTimeout = setTimeout(nextQuestionAuto, REVEAL_TIME);
}

function handleWrongOrTimeout() {
  if (locked || finished) return;
  locked = true;
  clearInterval(timerInterval);

  const item = quiz[index];
  const buttons = [...document.querySelectorAll(".answer")];
  buttons.forEach(b => {
    b.disabled = true;
    if (b.textContent === item.correct) b.classList.add("correctReveal");
  });

  document.getElementById("feedback").textContent = "ČAS VYPRŠEL";
  document.getElementById("feedback").className = "feedback bad";
  soundBad();

  revealTimeout = setTimeout(nextQuestionAuto, REVEAL_TIME);
}

function nextQuestionAuto() {
  index++;
  if (index >= quiz.length) finishQuiz(false);
  else renderQuestion();
}

function clearTimers() {
  clearInterval(timerInterval);
  clearTimeout(revealTimeout);
}


function getGrade(score) {
  if (score >= 18) return "1";
  if (score >= 16) return "2";
  if (score >= 14) return "3";
  if (score >= 12) return "4";
  return "5";
}

function finishQuiz(byCheat) {
  if (finished) return;
  finished = true;
  started = false;
  clearTimers();
  clearTimeout(cheatTimer);

  const passed = !byCheat && points >= PASS_LIMIT;
  const grade = byCheat ? "5" : getGrade(points);
  const vysledekText = byCheat ? "neplatné" : (passed ? "USPĚL" : "NEUSPĚL");
  const znamka = byCheat ? "5" : grade;
  const note = byCheat
    ? "Test ukončen: opuštění okna aplikace / podezření na podvod."
    : (passed ? `Splněno. Známka: ${grade}.` : `Nesplněno. Známka: ${grade}.`);

  document.getElementById("screenQuiz").classList.add("hidden");
  document.getElementById("screenResult").classList.remove("hidden");
  document.getElementById("finalTitle").textContent = byCheat ? "TEST UKONČEN" : vysledekText;
  document.getElementById("finalText").textContent = byCheat
    ? `Výsledek: ${points}/${quiz.length}. Známka: 5. Aplikace zaznamenala opuštění testu.`
    : `Výsledek: ${points}/${quiz.length}. Známka: ${grade}. Limit pro úspěch: ${PASS_LIMIT}/${TEST_COUNT}.`;

  if (byCheat) {
    soundCheat();
  } else {
    soundEnd(passed);
  }
  sendResult(znamka, note, vysledekText);
}

function goMenu() {
  clearTimers();
  document.getElementById("screenQuiz").classList.add("hidden");
  document.getElementById("screenResult").classList.add("hidden");
  document.getElementById("screenStart").classList.remove("hidden");
  document.getElementById("surname").value = "";
  document.getElementById("className").value = "";
  document.getElementById("surname").focus();
}

function sendResult(znamka, note, vysledekText) {
  const status = document.getElementById("sendStatus");

  if (!WEB_APP_URL) {
    status.textContent = "Výsledek nebyl odeslán – v HTML je nutné doplnit URL Apps Scriptu.";
    return;
  }

  const data = new URLSearchParams();
  data.append("timestamp", new Date().toISOString());
  data.append("aplikace", APP_NAME);
  data.append("trida", document.getElementById("className").value.trim());
  data.append("prijmeni", document.getElementById("surname").value.trim());
  data.append("jmeno", document.getElementById("surname").value.trim());
  data.append("vysledek", vysledekText || znamka);
  data.append("znamka", znamka);
  data.append("body", String(points));
  data.append("celkem", String(quiz.length));
  data.append("spravne", String(points));
  data.append("spatne", String(quiz.length - points));
  data.append("rezim", note.includes("opuštění") ? "PŘEKLIKNUTÍ" : "TEST");
  data.append("poznamka", note);
  data.append("odeslano", new Date().toLocaleString("cs-CZ"));
  data.append("technika", "skryty_formular_iframe");

  // Ověřená cesta z funkční aplikace Malý princ:
  // skutečné formulářové odeslání do skrytého iframe.
  const iframeName = "odesilaci_iframe";
  let iframe = document.querySelector('iframe[name="' + iframeName + '"]');
  if (!iframe) {
    iframe = document.createElement("iframe");
    iframe.name = iframeName;
    iframe.style.display = "none";
    document.body.appendChild(iframe);
  }

  const form = document.createElement("form");
  form.method = "POST";
  form.action = WEB_APP_URL;
  form.target = iframeName;
  form.style.display = "none";

  for (const [key, value] of data.entries()) {
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = key;
    input.value = value;
    form.appendChild(input);
  }

  document.body.appendChild(form);
  form.submit();
  status.textContent = "Výsledek byl odeslán do tabulky.";
  setTimeout(() => form.remove(), 1500);
}

/*
  Ochrana proti překliknutí:
  - krátké omylem vyvolané rozostření nestačí;
  - test se ukončí až při skutečném skrytí stránky delším než 1,2 s.
*/
document.addEventListener("visibilitychange", () => {
  if (!started || finished) return;

  if (document.hidden) {
    cheatTimer = setTimeout(() => {
      if (started && !finished && document.hidden) finishQuiz(true);
    }, 1200);
  } else {
    clearTimeout(cheatTimer);
  }
});

window.addEventListener("pagehide", () => {
  if (started && !finished) finishQuiz(true);
});
</script>
